# nixpacks.toml — Nixpacks build configuration for Railway
# Locks the Node.js version and sets up the build correctly.

[phases.install]
cmds = ["npm install", "cd dashboard && npm install", "cd dashboard && npm run build"]

[start]
cmd = "npm start"

[variables]
NODE_ENV = "production"
BOT_API_URL = "http://localhost:8989"
